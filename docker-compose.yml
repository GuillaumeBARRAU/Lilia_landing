version: "3.9"
services:
  db:
    image: postgres:16
    container_name: leadmagnet_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: leadmagnet
    ports:
      - "5432:5432"
    volumes:
      - leadmagnet_pgdata:/var/lib/postgresql/data

volumes:
  leadmagnet_pgdata: